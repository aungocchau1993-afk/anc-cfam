<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#080b10"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#3fb950" stroke-width="18" opacity="0.3"/>
  <!-- ANC text -->
  <text x="256" y="210" font-family="Arial Black, sans-serif" font-size="120" font-weight="900"
    fill="#3fb950" text-anchor="middle" dominant-baseline="middle">ANC</text>
  <!-- Divider line -->
  <rect x="96" y="228" width="320" height="3" rx="1.5" fill="#3fb950" opacity="0.4"/>
  <!-- CFAM text -->
  <text x="256" y="318" font-family="Arial Black, sans-serif" font-size="88" font-weight="900"
    fill="#58a6ff" text-anchor="middle" dominant-baseline="middle">CFAM</text>
  <!-- Bottom dot accent -->
  <circle cx="256" cy="400" r="8" fill="#3fb950" opacity="0.7"/>
  <circle cx="226" cy="400" r="5" fill="#3fb950" opacity="0.4"/>
  <circle cx="286" cy="400" r="5" fill="#3fb950" opacity="0.4"/>
</svg>
